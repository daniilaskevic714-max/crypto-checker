apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-checker-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: / 
spec:
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: crypto-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crypto-checker-service
                port:
                  number: 80